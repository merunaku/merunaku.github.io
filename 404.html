<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluaciones 2026 - ProfeDiego</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* Barra superior institucional agrupada a la izquierda */
        .navbar {
            background-color: #004077; 
            border-bottom: 4px solid #f2ae1b; 
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .brand img {
            height: 35px;
            width: auto;
        }
        .nav-title {
            text-align: left;
            border-left: 1px solid rgba(255,255,255,0.3);
            padding-left: 20px;
        }
        .nav-title h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .nav-title p {
            font-size: 0.8rem;
            color: #ddd;
        }
        /* Contenedor central */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .card h1 {
            color: #004077;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        .card p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        /* Grupo de botones unificados en azul institucional */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            background-color: #004077;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 14px;
            border-radius: 6px;
            transition: background 0.2s ease;
            font-size: 1rem;
        }
        .btn:hover {
            background-color: #002d54;
        }
    </style>
    <script>
        // Captura la URL errónea escrita por el alumno
        var urlIncorrecta = window.location.href.toLowerCase();

        // Redirección inmediata según la palabra clave detectada
        if (urlIncorrecta.includes("instind")) {
            window.location.replace("https://merunaku.github.io/InstInd2026/");
        } 
        else if (urlIncorrecta.includes("normativa")) {
            window.location.replace("https://merunaku.github.io/Normativa2026/");
        }
        else if (urlIncorrecta.includes("calculadora")) {
            window.location.replace("https://merunaku.github.io/calculadora2026/");
        }
    </script>
</head>
<body>

    <header class="navbar">
        <div class="brand">
            <img src="/logo.png" alt="Logo ProfeDiego" onerror="this.style.display='none'">
            <span>ProfeDiego</span>
        </div>
        <div class="nav-title">
            <h2>Plataforma de Estudios 2026</h2>
            <p>Portal del Estudiante • IPCHILE</p>
        </div>
    </header>

    <main class="main-container">
        <div class="card">
            <h1>¡Te damos la bienvenida!</h1>
            <p>Por favor, selecciona la asignatura o herramienta a la que deseas acceder para comenzar. ¡Mucho éxito en tu evaluación!</p>
            
            <div class="button-group">
                <a href="https://merunaku.github.io/InstInd2026/" class="btn">
                    Instrumentación Industrial 2026
                </a>
                <a href="https://merunaku.github.io/Normativa2026/" class="btn">
                    Normativa 2026
                </a>
                <a href="https://merunaku.github.io/calculadora2026/" class="btn">
                    Calculadora 2026
                </a>
            </div>
        </div>
    </main>

</body>
</html>
